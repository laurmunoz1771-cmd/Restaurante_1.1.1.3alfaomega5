<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>Sabores de Lisboa - Gastronomía de Autor</title>
  
  <link rel="stylesheet" href="/css/portugal.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Playfair+Display:ital,wght@0,600;0,800;1,500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body>

<header class="hero">
  <div class="overlay">
    <h1>Sabores de Lisboa</h1>
    <p>TRADICIÓN & VANGUARDIA</p>
  </div>
</header>

<nav id="main-nav" class="nav-container" style="display:none;">
  <button onclick="showSection('reservation-section')" class="nav-btn"><i class="fas fa-calendar-alt"></i> MESA</button>
  <button onclick="showSection('menu-section')" class="nav-btn"><i class="fas fa-utensils"></i> CARTA</button>
</nav>

<section id="login-section" class="container-fluid">
  <div class="reservation-container">
    <h2 style="text-align:center; color:#8b1e3f;">Iniciar Sesión</h2>
    <form id="login-form">
      <input type="email" id="user" placeholder="Email" required />
      <input type="password" id="pass" placeholder="Contraseña" required />
      <button type="submit" class="btn-reserve">ENTRAR</button>
    </form>
    <div class="social-login">
      <button type="button" class="google-btn" id="btn-google"><i class="fab fa-google"></i> Google</button>
      <button type="button" class="github-btn" id="btn-github"><i class="fab fa-github"></i> GitHub</button>
    </div>
    <p class="switch-auth">¿No tienes cuenta? <span id="show-register" style="cursor:pointer; color:#8b1e3f; font-weight:bold;">Regístrate</span></p>
  </div>
</section>

<section id="register-section" class="container-fluid" style="display:none;">
  <div class="reservation-container">
    <h2 style="text-align:center;">Registro</h2>
    <form id="register-form">
      <input type="email" id="new-user" placeholder="Email" required />
      <input type="password" id="new-pass" placeholder="Contraseña" required />
      <button type="submit" class="btn-reserve">CREAR CUENTA</button>
    </form>
    <p class="switch-auth">¿Ya tienes cuenta? <span id="show-login" style="cursor:pointer; color:#8b1e3f; font-weight:bold;">Inicia sesión</span></p>
  </div>
</section>

<section id="reservation-section" class="container-fluid" style="display:none;">
  <div class="reservation-container">
    <h2 style="text-align:center;">Reservación</h2>
    <form id="reservation-form-submit">
      <input type="text" id="name" placeholder="Su Nombre" required />
      <div class="form-row">
        <select id="people" required>
          <option value="" disabled selected>Personas...</option>
          <option value="1">1 Persona</option>
          <option value="2">2 Personas</option>
          <option value="4">4 Personas</option>
          <option value="6">6 Personas</option>
        </select>
        <input type="date" id="date" required />
      </div>
      <input type="time" id="time" required />
      <div class="btn-group-responsive">
        <button type="button" id="btn-only-res" class="btn-secondary">SÓLO MESA</button>
        <button type="submit" class="btn-reserve">MESA Y MENÚ</button>
      </div>
    </form>
  </div>
</section>

<main id="menu-section" class="menu-container" style="display:none;">
  <div class="top-bar">
    <div id="active-res-info" class="res-badge"></div>
    <button onclick="logout()" class="logout-btn"><i class="fas fa-sign-out-alt"></i> SALIR</button>
  </div>
  
  <div class="category-buttons">
    <button onclick="filterMenu('all')">Todo</button>
    <button onclick="filterMenu('entradas')">Entradas</button>
    <button onclick="filterMenu('platos')">Platos</button>
    <button onclick="filterMenu('postres')">Postres</button>
    <button onclick="filterMenu('bebidas')">Bebidas</button>
  </div>

  <div id="menu-items" class="menu-grid"></div>
  
  <div class="bottom-layout">
    <section class="order-panel cart-section">
      <h2>🧾 Carrito</h2>
      <ul id="order-list"></ul>
      <div class="cart-total">
        <span>Total:</span>
        <span>$<span id="total">0.00</span></span>
      </div>
      <button id="checkout-btn" class="btn-reserve">CONFIRMAR PEDIDO</button>
    </section>

    <section class="history-panel">
      <div class="history-column">
        <h3>📅 RESERVAS</h3>
        <ul id="history-reservations" class="history-list-styled"></ul>
      </div>
      <div class="history-column">
        <h3>🛍️ PEDIDOS</h3>
        <ul id="history-orders" class="history-list-styled"></ul>
      </div>
    </section>
  </div>
</main>

<!-- Modal del ticket -->
<div class="modal" id="ticket-modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:1000; justify-content:center; align-items:center; overflow-y:auto;">
  <div class="modal-content" style="background:white; padding:20px; border-radius:10px; max-width:500px; width:90%; position:relative; max-height:90%; overflow-y:auto;">
    <div id="ticket-content"></div>
    <div style="display:flex; gap:10px; margin-top:20px; flex-wrap:wrap; justify-content:center;">
      <button class="btn-reserve" id="download-pdf-btn" style="flex:1; min-width:120px; background:#8b1e3f; color:white; border:none; padding:10px; border-radius:5px; cursor:pointer;">
        <i class="fas fa-download"></i> Descargar PDF
      </button>
      <button class="btn-secondary" id="close-modal-btn" style="flex:1; min-width:120px; background:#666; color:white; border:none; padding:10px; border-radius:5px; cursor:pointer;">
        <i class="fas fa-times"></i> Cerrar
      </button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { 
    getAuth, 
    onAuthStateChanged, 
    signInWithEmailAndPassword, 
    createUserWithEmailAndPassword, 
    signOut, 
    GoogleAuthProvider, 
    GithubAuthProvider, 
    signInWithPopup, 
    setPersistence, 
    browserSessionPersistence 
  } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

  import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
  import { getStorage } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-storage.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDQqkNjw9peKOjXM6WshH8kwlEbPE6zdpE",
    authDomain: "lisboa-c0410.firebaseapp.com",
    projectId: "lisboa-c0410",
    storageBucket: "lisboa-c0410.firebasestorage.app",
    messagingSenderId: "349193466799",
    appId: "1:349193466799:web:ea8b727db3266f5c69b55a"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);
  window.firebaseAuth = auth;

  setPersistence(auth, browserSessionPersistence);
  
  if (window.emailjs) {
    emailjs.init("5PlbENJnKs0I2VsyC");
  }

  const today = new Date().toISOString().split('T')[0];
  const dateInput = document.getElementById('date');
  if (dateInput) {
    dateInput.setAttribute('min', today);
    dateInput.addEventListener('change', function() {
      if (this.value < today) {
        this.value = today;
        Swal.fire('Fecha no válida', 'No se pueden seleccionar días pasados', 'warning');
      }
    });
  }

  let currentUser = null;

  onAuthStateChanged(auth, (user) => {
    if (user) {
      currentUser = user;
      console.log('✅ USUARIO LOGUEADO:', user.email);
      
      document.getElementById("login-section").style.display = "none";
      document.getElementById("register-section").style.display = "none";
      document.getElementById("main-nav").style.display = "flex";
      window.showSection('reservation-section');
      if(window.loadHistory) window.loadHistory();
    } else {
      currentUser = null;
      document.getElementById("login-section").style.display = "block";
      document.getElementById("main-nav").style.display = "none";
      document.getElementById("reservation-section").style.display = "none";
      document.getElementById("menu-section").style.display = "none";
    }
  });

  document.getElementById("login-form").onsubmit = async (e) => {
    e.preventDefault();
    try {
      await signInWithEmailAndPassword(auth, document.getElementById("user").value, document.getElementById("pass").value);
    } catch (err) {
      Swal.fire('Error', 'Usuario o contraseña incorrectos', 'error');
    }
  };

  document.getElementById("register-form").onsubmit = async (e) => {
    e.preventDefault();
    try {
      const cred = await createUserWithEmailAndPassword(auth, document.getElementById("new-user").value, document.getElementById("new-pass").value);
      await setDoc(doc(db, "usuarios", cred.user.uid), { email: cred.user.email, creado: new Date().toISOString() });
      Swal.fire('¡Éxito!', 'Cuenta creada correctamente', 'success');
    } catch (err) {
      Swal.fire('Error', err.message, 'error');
    }
  };

  document.getElementById("btn-google").onclick = () => signInWithPopup(auth, new GoogleAuthProvider());
 document.getElementById("btn-github").onclick = async () => {
  try {
    const provider = new GithubAuthProvider();
    const result = await signInWithPopup(auth, provider);

    console.log("LOGIN GITHUB:", result.user);
  } catch (error) {
    if (error.code === "auth/account-exists-with-different-credential") {
      const email = error.customData.email;
      const pendingCred = GithubAuthProvider.credentialFromError(error);

      Swal.fire(
        "Cuenta existente",
        `Este correo ya está registrado con otro método: ${email}`,
        "info"
      );

      console.log("Debes vincular cuenta manualmente aquí");
    } else {
      console.error(error);
      Swal.fire("Error", error.message, "error");
    }
  }
};

  document.getElementById("show-register").onclick = () => {
    document.getElementById("login-section").style.display="none";
    document.getElementById("register-section").style.display="block";
  };

  document.getElementById("show-login").onclick = () => {
    document.getElementById("register-section").style.display="none";
    document.getElementById("login-section").style.display="block";
  };

  window.getCurrentFirebaseEmail = () => {
    return currentUser ? currentUser.email : null;
  };
</script>

<script src="/js/funcion.js"></script>

</body>
</html>
